<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuerdos de Nuestra Boda - Yeison & Angela</title>
    <meta name="description" content="Revive la magia de nuestro gran día. Ábrenos las puertas a nuestros mejores recuerdos.">
    
    <!-- Etiquetas Open Graph para WhatsApp, Facebook, iMessage, etc. -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yeisonxangela.onrender.com/v3">
    <meta property="og:title" content="Recuerdos de Nuestra Boda - Yeison & Angela">
    <meta property="og:description" content="Te invitamos a revivir los mejores momentos de nuestra boda entrando a nuestra galería especial.">
    <meta property="og:image" content="https://yeisonxangela.onrender.com/images/logo.png">
    <meta property="og:image:secure_url" content="https://yeisonxangela.onrender.com/images/logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    <link rel="image_src" href="https://yeisonxangela.onrender.com/images/logo.png">
    
    <!-- Etiquetas para Twitter/X -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yeisonxangela.onrender.com/v3">
    <meta property="twitter:title" content="Recuerdos de Nuestra Boda - Yeison & Angela">
    <meta property="twitter:description" content="Te invitamos a revivir los mejores momentos de nuestra boda entrando a nuestra galería especial.">
    <meta property="twitter:image" content="https://yeisonxangela.onrender.com/images/logo.png">

    <!-- Favicon (El icono en la pestaña del navegador) -->
    <link rel="icon" type="image/png" href="images/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="flying-photos-container"></div>
    
    <div id="scene-container"></div>

    <!-- Logo in corner before click -->
    <div class="corner-logo-wrapper" id="top-logo">
        <img src="images/logo.png" alt="Logo de Boda">
    </div>

    <div id="content" class="hidden">
        <div class="floral-corner top-left"></div>
        <div class="floral-corner bottom-right"></div>
        
        <img src="images/logo.png" alt="Logo de Boda Final" class="final-logo fade-in">
        <h1 class="fade-in delay-1">Un Recuerdo Eterno</h1>
        <p class="fade-in delay-2">Gracias por acompañarnos en el día más feliz de nuestras vidas. Fue un honor compartir este momento con ustedes.</p>
        <p class="fade-in delay-2">Aquí puedes revivir la magia de nuestra boda:</p>
        <a href="https://photos.app.goo.gl/BahjxPR759fBPiSh7" target="_blank" class="glowing-btn fade-in delay-3">Ver Galería de Fotos</a>
    </div>

    <div class="doors-wrapper" id="doors-wrapper">
        <div class="floral-corner top-left"></div>
        <div class="floral-corner bottom-right"></div>
        
        <div class="door-frame" id="door-frame">
            <div class="door left-door" id="left-door">
                <div class="door-inner">
                    <div class="panel"></div>
                    <div class="panel"></div>
                    <div class="panel"></div>
                    <div class="handle right"></div>
                </div>
            </div>
            <div class="door right-door" id="right-door">
                <div class="door-inner">
                    <div class="panel"></div>
                    <div class="panel"></div>
                    <div class="panel"></div>
                    <div class="handle left"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
